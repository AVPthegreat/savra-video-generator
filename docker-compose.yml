services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./savra.db}
      APP_ENV: ${APP_ENV:-development}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-prefer}
      ENABLE_AUTH: ${ENABLE_AUTH:-true}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-replace_this_with_a_long_random_string_for_production}
    command: ["sh", "-c", "python /app/scripts/migrate_db.py && uvicorn backend.main:app --app-dir /app --host 0.0.0.0 --port 8000"]
    volumes:
      - renderer_runs:/app/renderer/runs
      - renderer_public_runs:/app/renderer/public/runs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 20s
      timeout: 5s
      retries: 4
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-savra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-s1310828}
      POSTGRES_DB: ${POSTGRES_DB:-savradb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  renderer_runs:
  renderer_public_runs:
