steps:
  # Step 1: Build the image using the modern Artifact Registry path
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/savra-video-generator:$COMMIT_SHA', 
      '.', 
      '-f', 'Dockerfile'
    ]

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/savra-video-generator:$COMMIT_SHA']

  # Step 3: Deploy to Cloud Run with increased timeout and explicit PORT
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'savra-video-generator',
      '--image', 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/savra-video-generator:$COMMIT_SHA',
      '--region', 'europe-west1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--timeout', '3600',
      '--max-instances', '1',
      '--min-instances', '0',
      '--memory', '8Gi',
      '--cpu', '4',
      '--no-cpu-throttling',
      '--execution-environment', 'gen2',
      '--set-env-vars', 'APP_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID',
      '--add-cloudsql-instances', '$PROJECT_ID:europe-west1:savra-db'
    ]

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/savra-video-generator:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
